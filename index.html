<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiverX App</title>
    <!-- Added simple client-side navigation fallback for Vite + React SPA -->
    <script>
      // This script ensures direct navigation to /menu and /reservation routes works without 404
      document.addEventListener('DOMContentLoaded', () => {
        const root = document.getElementById('root');
        if (!root) return;

        // List of known valid SPA paths
        const validPaths = ['/', '/menu', '/reservation'];

        // If current path isn't recognized, fallback to root
        if (!validPaths.includes(window.location.pathname)) {
          window.history.replaceState({}, '', '/');
        }

        // Handle clicks on anchor tags linking to known SPA routes
        document.body.addEventListener('click', (e) => {
          const target = e.target;
          if (target.tagName === 'A') {
            const href = target.getAttribute('href');
            if (validPaths.includes(href)) {
              e.preventDefault();
              window.history.pushState({}, '', href);
              window.dispatchEvent(new PopStateEvent('popstate'));
            }
          }
        });
      });

      // Listen to popstate to notify SPA router of navigation
      window.addEventListener('popstate', () => {
        const navigationEvent = new CustomEvent('spa:navigate', {
          detail: { path: window.location.pathname }
        });
        window.dispatchEvent(navigationEvent);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
