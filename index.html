<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiverX App</title>
    <!-- Added simple client-side navigation fallback for Vite + React SPA -->
    <script>
      // This script ensures direct navigation to /menu and /reservation routes works without 404
      document.addEventListener('DOMContentLoaded', () => {
        const root = document.getElementById('root');
        if (!root) return;

        // List of known valid SPA paths
        const validPaths = ['/', '/menu', '/reservation'];

        // If current path isn't recognized, fallback to root
        if (!validPaths.includes(window.location.pathname)) {
          window.history.replaceState({}, '', '/');
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
